<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Page</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .register-box {
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 340px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    label {
        font-size: 14px;
        color: #444;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 6px 0 14px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
        outline: none;
    }

    input:focus {
        border-color: #ff6b6b;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #ff6b6b;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #e85c5c;
    }

    .footer {
        text-align: center;
        margin-top: 12px;
        font-size: 12px;
        color: #666;
    }
</style>

</head>

<body>

<div class="register-box">
    <h2>Register</h2>

    <form action="registeration" method="post">

        <label>Name</label>
        <input type="text" name="name" placeholder="Enter your Name" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your Email" required>

        <label>User Name</label>
        <input type="text" name="userName" placeholder="Enter Username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Register</button>
    </form>

    <div class="footer">
        <a href = "login.html">Already have an account? Go to Login</a>
    </div>
</div>

</body>
</html>
