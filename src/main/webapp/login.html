<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-box {
        background: #fff;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 320px;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    label {
        font-size: 14px;
        color: #444;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0 15px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
        outline: none;
    }

    input:focus {
        border-color: #667eea;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #4a5bdc;
    }

    .footer-text {
        text-align: center;
        margin-top: 15px;
        font-size: 12px;
        color: #666;
    }
    .register-btn {
    display: block;
    text-align: center;
    margin-top: 12px;
    padding: 10px;
    border-radius: 6px;
    text-decoration: none;
    background: #28a745;
    color: white;
    font-size: 14px;
    transition: 0.3s;
}

.register-btn:hover {
    background: #1f7a33;
}
</style>

</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <form action="login" method="post">
        <label>User Name</label>
        <input type="text" name="userName" placeholder="Enter Username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>
    <a class="register-btn" href="Registeration.html">
    New User? Register</a>
    

    <div class="footer-text">
        Welcome back 👋
    </div>
</div>

</body>
</html>
